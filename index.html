<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สั่งดินออนไลน์</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; text-align: left; }
        select { 
            width: 100%; padding: 12px; font-size: 16px; 
            border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px;
        }
        #btnPicker { 
            width: 100%; padding: 15px; font-size: 18px; 
            background-color: #00b900; color: white; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        #status { margin-top: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚚 สั่งดิน/วัสดุถม (ระบุพิกัด)</h2>
        
        <label>ชนิดวัสดุ:</label>
        <select id="soilType">
            <option value="ดินถมทั่วไป">ดินถมทั่วไป</option>
            <option value="ดินลูกรัง">ดินลูกรัง</option>
            <option value="ทรายละเอียด">ทรายละเอียด</option>
            <option value="หินคลุก">หินคลุก</option>
        </select>

        <label>ประเภทรถ:</label>
        <select id="carType">
            <option value="6 ล้อ">รถ 6 ล้อ</option>
            <option value="10 ล้อ">รถ 10 ล้อ</option>
            <option value="พ่วง">รถพ่วง</option>
        </select>

        <button id="btnPicker" onclick="openLocationPicker()">📍 เลือกพิกัดหน้างานบนแผนที่</button>
        
        <p id="status">เลือกวัสดุแล้วกดปุ่มเพื่อปักหมุดพิกัด</p>
    </div>

    <script>
        const liffId = "2009364460-4bj0WDAv"; 

        async function main() {
            try {
                await liff.init({ liffId: liffId });
                if (!liff.isLoggedIn()) {
                    liff.login();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function openLocationPicker() {
            // ดึงค่าที่ลูกค้าเลือกไว้
            const soil = document.getElementById("soilType").value;
            const car = document.getElementById("carType").value;

            // ใช้คำสั่งเปิดตัวเลือกพิกัดมาตรฐานของ LINE
            // ลูกค้าจะสามารถค้นหาที่อยู่หรือเลื่อนหมุดเองได้
            liff.sendMessages([{
                type: "template",
                altText: "กรุณาเลือกตำแหน่งส่งดิน",
                template: {
                    type: "buttons",
                    text: `กำลังสั่ง: ${soil} (${car})\nกรุณากดปุ่มด้านล่างเพื่อเลือกพิกัด`,
                    actions: [{
                        type: "uri",
                        label: "🚩 ปักหมุดพิกัดหน้างาน",
                        uri: "https://line.me/R/nv/location/" 
                    }]
                }
            }]).then(() => {
                // หลังจากส่งปุ่มเลือกพิกัดเสร็จ ให้ปิดหน้า LIFF
                // ลูกค้าจะไปกดเลือกพิกัดต่อในห้องแชท
                liff.closeWindow();
            }).catch((err) => {
                alert("Error: " + err.message);
            });
        }

        main();
    </script>
</body>
</html>
